services:
  postgres:
    image: postgres:15-alpine
    container_name: quiz-postgres
    environment:
      POSTGRES_USER: aiquiz
      POSTGRES_PASSWORD: aiquiz_password
      POSTGRES_DB: aiquiz
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - quiz-network

  redis:
    image: redis:7-alpine
    container_name: quiz-redis
    networks:
      - quiz-network

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: quiz-backend
    environment:
      NODE_ENV: production
      PORT: 3012
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: aiquiz
      DB_PASSWORD: aiquiz_password
      DB_DATABASE: aiquiz
      DB_SSL: 'false'
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: https://quiz.profitbenefit.com
      JWT_SECRET: your-secret-key-here-change-this-in-production
      DB_SYNCHRONIZE: 'true'
    depends_on:
      - postgres
      - redis
    networks:
      - quiz-network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.profitbenefit.com/api/v1
    container_name: quiz-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.profitbenefit.com/api/v1
    depends_on:
      - backend
    networks:
      - quiz-network

networks:
  quiz-network:
    driver: bridge

volumes:
  postgres_prod_data:
